name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint + Prettier)
        run: npm run lint

      - name: Lint (rustfmt)
        run: cd src-tauri && cargo fmt --check

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Unit tests (Vitest)
        run: npm run test:unit

      - name: Unit tests (Rust)
        run: cd src-tauri && cargo test

      - name: Build Tauri binary (debug)
        run: cd src-tauri && cargo build

      - name: Report debug binary size
        run: |
          SIZE=$(stat -f%z src-tauri/target/debug/app 2>/dev/null || stat -c%s src-tauri/target/debug/app)
          echo "Debug binary size: $((SIZE / 1024 / 1024)) MB (release target: <20 MB)"

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run e2e tests
        run: npx playwright test
