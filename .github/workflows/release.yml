name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri release bundle
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Check release binary size (must be < 20 MB)
        run: |
          SIZE=$(stat -f%z src-tauri/target/release/app 2>/dev/null || stat -c%s src-tauri/target/release/app)
          LIMIT=$((20 * 1024 * 1024))
          echo "Release binary size: $((SIZE / 1024 / 1024)) MB (limit: 20 MB)"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "ERROR: release binary exceeds 20 MB limit"
            exit 1
          fi

      - name: Upload .dmg to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/dmg/*.dmg
          generate_release_notes: true
